[workspace]
authors = ["Scott Henderson <3924836+scottyhq@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "solus-stac"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]
build = "python build_catalog.py"

[dependencies]
jsonschema = ">=4"
pandas = ">=2"
pystac = ">=1"
rio-stac = ">=0.12.0,<0.13"
virtualizarr = ">=2.4.0,<3"
ipykernel = ">=7.2.0,<8"
scipy = ">=1.17.0,<2"
icechunk = ">=1.1.19,<2"
matplotlib-base = ">=3.10.8,<4"
rioxarray = ">=0.21.0,<0.22"
rich = ">=14.3.3,<15"
odc-stac = ">=0.5.2,<0.6"
dask = ">=2026.1.2,<2027"

[pypi-dependencies]
virtual-tiff = ">=0.2.1, <0.3"
rasterix = ">=0.2.1, <0.3"
xproj = ">=0.2.1, <0.3"
